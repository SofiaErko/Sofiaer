<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>♻️ Эко-бот: Раздельный сбор мусора</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 85vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 0.85em;
            opacity: 0.95;
        }

        .stats-bar {
            background: #f0f2f5;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: #555;
            border-bottom: 1px solid #ddd;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .bot .message-content {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            border-bottom-left-radius: 4px;
        }

        .user .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .quick-buttons {
            padding: 10px 20px;
            background: white;
            border-top: 1px solid #ddd;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            gap: 10px;
        }

        .quick-btn {
            background: #f0f2f5;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        .quick-btn:hover {
            background: #2ecc71;
            color: white;
            transform: translateY(-2px);
        }

        .input-area {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
            gap: 10px;
        }

        #userInput {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        #userInput:focus {
            border-color: #2ecc71;
        }

        #sendBtn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s;
        }

        #sendBtn:hover {
            transform: scale(1.05);
        }

        .typing-indicator {
            display: none;
            padding: 10px 20px;
            background: white;
            border-radius: 18px;
            width: fit-content;
            margin-bottom: 10px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .message-content {
                max-width: 85%;
            }
            
            .quick-buttons {
                padding: 10px;
            }
            
            .quick-btn {
                font-size: 0.75em;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>♻️ Эко-бот: Разделяй мусор</h1>
            <p>Спроси, куда выбросить отходы</p>
        </div>
        <div class="stats-bar">
            <span>📊 Знаю <span id="wasteCount">0</span> видов отходов</span>
            <span>💚 Сообщений: <span id="msgCount">0</span></span>
        </div>
        <div class="messages" id="messages">
            <div class="message bot">
                <div class="message-content">
                    🌱 Привет! Я помогу тебе сортировать мусор.<br><br>
                    📝 Просто напиши, что хочешь выбросить:<br>
                    • пластиковая бутылка<br>
                    • батарейка<br>
                    • стекло<br>
                    • бумага<br><br>
                    Или выбери быстрый вариант ниже 👇
                </div>
            </div>
        </div>
        <div class="quick-buttons">
            <button class="quick-btn" onclick="sendQuickMessage('пластиковая бутылка')">🥤 Пластик</button>
            <button class="quick-btn" onclick="sendQuickMessage('батарейка')">🔋 Батарейка</button>
            <button class="quick-btn" onclick="sendQuickMessage('стекло')">🥃 Стекло</button>
            <button class="quick-btn" onclick="sendQuickMessage('бумага')">📄 Бумага</button>
            <button class="quick-btn" onclick="sendQuickMessage('банан')">🍌 Органика</button>
            <button class="quick-btn" onclick="sendQuickMessage('одежда')">👕 Одежда</button>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Напиши отход..." onkeypress="handleKeyPress(event)">
            <button id="sendBtn" onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        // --- БАЗА ЗНАНИЙ (расширенная) ---
        const wasteRules = {
            // Пластик
            "пластиковая бутылка": "♻️ ПЕРЕРАБОТКА\n\n✅ Чистую, сжатую, без крышки\n🗑️ Синий контейнер\n💡 Крышки собирай отдельно!",
            "пэт бутылка": "♻️ ПЕРЕРАБОТКА (PET)\n🗑️ Синий контейнер",
            "бутылка": "♻️ ПЕРЕРАБОТКА (если пластик)\n❓ Уточни: пластик или стекло?",
            "крышка": "♻️ ПЕРЕРАБОТКА (отдельно от бутылки)\n💡 Многие фонды собирают крышки на благотворительность",
            "стаканчик от кофе": "🚮 СМЕШАННЫЕ ОТХОДЫ\n⚠️ У него пластиковое покрытие, не перерабатывается",
            "кофейный стаканчик": "🚮 СМЕШАННЫЕ ОТХОДЫ",
            "пакет": "🚮 СМЕШАННЫЕ ОТХОДЫ\n💡 Лучше использовать эко-сумку!",
            "плёнка": "🚮 СМЕШАННЫЕ ОТХОДЫ",
            "пенопласт": "🚮 СМЕШАННЫЕ ОТХОДЫ\n⚠️ Не перерабатывается",
            "одноразовая посуда": "🚮 СМЕШАННЫЕ ОТХОДЫ\n💡 Используй многоразовую!",
            
            // Стекло
            "стеклянная банка": "♻️ ПЕРЕРАБОТКА\n✅ Сполоснуть, снять крышку\n🗑️ Зелёный контейнер",
            "стекло": "♻️ ПЕРЕРАБОТКА\n🗑️ Зелёный контейнер\n⚠️ Не бей!",
            "бутылка стеклянная": "♻️ ПЕРЕРАБОТКА\n🗑️ Зелёный контейнер",
            "банка": "♻️ ПЕРЕРАБОТКА (если стекло или металл)",
            
            // Металл
            "алюминиевая банка": "♻️ ПЕРЕРАБОТКА\n✅ Сполоснуть, смять\n🗑️ Синий контейнер\n💡 Переработка алюминия экономит 95% энергии!",
            "жестяная банка": "♻️ ПЕРЕРАБОТКА (металл)\n🗑️ Синий контейнер",
            "консервная банка": "♻️ ПЕРЕРАБОТКА\n✅ Вымыть, убрать этикетку",
            
            // Бумага
            "бумага": "♻️ ПЕРЕРАБОТКА\n✅ Чистая, не жирная\n🗑️ Синий контейнер\n💡 1 тонна бумаги = 17 спасённых деревьев!",
            "картон": "♻️ ПЕРЕРАБОТКА\n✅ Сложить, убрать скотч\n🗑️ Синий контейнер",
            "газета": "♻️ ПЕРЕРАБОТКА\n🗑️ Синий контейнер",
            "журнал": "♻️ ПЕРЕРАБОТКА\n⚠️ Удалить скрепки и пластиковую обложку",
            "чеки": "🚮 СМЕШАННЫЕ ОТХОДЫ\n⚠️ Термобумага НЕ перерабатывается!",
            "туалетная бумага": "🚮 СМЕШАННЫЕ ОТХОДЫ (можно в унитаз, если нет химии)",
            
            // Опасные
            "батарейка": "⚠️ ОПАСНЫЕ ОТХОДЫ\n❌ НИ В КОЕМ СЛУЧАЕ в мусор!\n✅ Сдать в спецконтейнер (магазины, ТЦ)\n💡 Одна батарейка загрязняет 20 м² земли!",
            "батарейки": "⚠️ ОПАСНЫЕ ОТХОДЫ\n🗑️ Только в спецконтейнер",
            "пальчиковая батарейка": "⚠️ ОПАСНЫЕ ОТХОДЫ\n🗑️ Пункты приёма батареек",
            "лампочка": "⚠️ ОПАСНЫЕ ОТХОДЫ (ртуть)\n🗑️ Спецконтейнер для ламп",
            "энергосберегающая лампа": "⚠️ ОПАСНЫЕ ОТХОДЫ\n❌ Не в стекло!",
            "градусник": "⚠️ ОПАСНЫЕ ОТХОДЫ (ртуть)\n🚨 Вызвать МЧС!",
            "аккумулятор": "⚠️ ОПАСНЫЕ ОТХОДЫ\n🗑️ Пункты приёма",
            "краска": "⚠️ ОПАСНЫЕ ОТХОДЫ\n❌ Не сливать в раковину!",
            "лекарства": "⚠️ ОПАСНЫЕ ОТХОДЫ\n✅ Сдать в аптеку на утилизацию",
            "ампула": "⚠️ ОПАСНЫЕ ОТХОДЫ\n🗑️ Контейнер для острых предметов",
            
            // Органика
            "яблоко": "🍂 ОРГАНИКА / СМЕШАННЫЕ\n🗑️ Серый контейнер\n💡 Можно в компост!",
            "банан": "🍂 ОРГАНИКА / СМЕШАННЫЕ\n🗑️ Серый контейнер",
            "огрызок": "🍂 ОРГАНИКА",
            "очистки": "🍂 ОРГАНИКА\n💡 Сделай компостную яму!",
            "скорлупа": "🍂 ОРГАНИКА",
            "чайный пакетик": "🍂 ОРГАНИКА / СМЕШАННЫЕ\n⚠️ Если с пластиком - в смешанные",
            
            // Текстиль
            "одежда": "👕 ТЕКСТИЛЬ\n✅ Отдать в контейнер для вещей\n💡 Хорошую одежду можно перепродать!",
            "футболка": "👕 ТЕКСТИЛЬ\n🗑️ Контейнер для одежды",
            "джинсы": "👕 ТЕКСТИЛЬ\n♻️ Некоторые бренды принимают на переработку",
            "носки": "🚮 СМЕШАННЫЕ ОТХОДЫ (если старые)",
            "игрушка": "👕 ТЕКСТИЛЬ / БЛАГОТВОРИТЕЛЬНОСТЬ\n✅ Если целая - отдать",
            
            // Электроника
            "телефон": "📱 ЭЛЕКТРОНИКА\n✅ Сдать в пункт утилизации\n❌ Не в мусор!",
            "ноутбук": "📱 ЭЛЕКТРОНИКА\n🗑️ Спецпункты приёма",
            "зарядка": "📱 ЭЛЕКТРОНИКА\n♻️ Принимают в некоторых магазинах",
            "наушники": "🚮 СМЕШАННЫЕ ОТХОДЫ (мелкая электроника)",
            
            // Другое
            "зубная щётка": "🚮 СМЕШАННЫЕ ОТХОДЫ\n⚠️ Смешанные материалы не перерабатываются",
            "бутылка от масла": "⚠️ ОПАСНЫЕ (если с маслом)\n✅ Вытереть и в переработку",
            "сигарета": "🚮 СМЕШАННЫЕ ОТХОДЫ\n❌ Не бросать на землю!",
            "окурок": "🚮 СМЕШАННЫЕ ОТХОДЫ",
            "маска медицинская": "🚮 СМЕШАННЫЕ ОТХОДЫ\n⚠️ Если использована - в смешанные",
            "перчатка": "🚮 СМЕШАННЫЕ ОТХОДЫ",
            "бумажный стаканчик": "🚮 СМЕШАННЫЕ ОТХОДЫ\n⚠️ Из-за пластикового слоя не перерабатывается",
            "трубочка": "🚮 СМЕШАННЫЕ ОТХОДЫ\n💡 Используй многоразовые трубочки!"
        };

        // Эко-советы
        const ecoTips = [
            "💡 Перед переработкой ополосни упаковку!",
            "🌍 1 батарейка загрязняет 20 м² земли и 400 л воды!",
            "💡 Сминай пластиковые бутылки - так они занимают меньше места",
            "♻️ Переработка алюминия экономит 95% энергии",
            "🌱 Компостируй органику - это бесплатное удобрение!",
            "💡 Крышечки можно сдавать на благотворительность",
            "📦 Используй многоразовые сумки вместо пакетов",
            "💧 Не выливай масло в раковину - 1 литр загрязняет 1000 л воды!",
            "👕 Сдавай старую одежду на переработку или в благотворительность",
            "📱 Сдавай электронику в утилизацию - она содержит ценные металлы"
        ];

        let messageCount = 0;
        
        // Обновляем счётчик видов отходов
        document.getElementById('wasteCount').innerText = Object.keys(wasteRules).length;

        // Функция добавления сообщения
        function addMessage(text, isUser = false) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = text.replace(/\n/g, '<br>');
            
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            
            // Прокрутка вниз
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            if (!isUser) {
                messageCount++;
                document.getElementById('msgCount').innerText = messageCount;
            }
        }

        // Показать индикатор печати
        function showTyping() {
            const messagesDiv = document.getElementById('messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        // Поиск ответа
        function getBotResponse(userInput) {
            const input = userInput.toLowerCase().trim();
            
            // Прямое совпадение
            if (wasteRules[input]) {
                return wasteRules[input];
            }
            
            // Поиск по ключевым словам
            for (let [keyword, response] of Object.entries(wasteRules)) {
                if (input.includes(keyword)) {
                    // Иногда добавляем эко-совет
                    if (response.includes('♻️') && Math.random() < 0.3) {
                        const randomTip = ecoTips[Math.floor(Math.random() * ecoTips.length)];
                        return response + '\n\n' + randomTip;
                    }
                    return response;
                }
            }
            
            // Если не найдено
            return "🤔 Я не знаю этот тип отхода.\n\nПопробуй написать иначе:\n• пластиковая бутылка\n• батарейка\n• стекло\n• бумага\n• одежда\n\nИли уточни, что именно ты хочешь выбросить?";
        }

        // Отправить сообщение
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Показываем сообщение пользователя
            addMessage(message, true);
            input.value = '';
            
            // Показываем индикатор печати
            showTyping();
            
            // Имитация задержки бота
            setTimeout(() => {
                hideTyping();
                const response = getBotResponse(message);
                addMessage(response, false);
            }, 500);
        }

        // Быстрые сообщения
        function sendQuickMessage(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        // Обработка Enter
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Сохраняем базу в localStorage (для статистики)
        function saveStats() {
            localStorage.setItem('ecoBotStats', JSON.stringify({
                messages: messageCount,
                lastVisit: new Date().toISOString()
            }));
        }

        // Загружаем статистику
        function loadStats() {
            const stats = localStorage.getItem('ecoBotStats');
            if (stats) {
                const data = JSON.parse(stats);
                messageCount = data.messages || 0;
                document.getElementById('msgCount').innerText = messageCount;
            }
        }

        // Автосохранение статистики
        setInterval(saveStats, 10000);
        loadStats();
    </script>
</body>
</html>
